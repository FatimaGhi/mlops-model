name: ML Model CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 709598629349.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: model-serving
  ROLE_ARN: arn:aws:iam::709598629349:role/github-actions-mlops

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 1 — Lint
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8 black

      - name: Black check
        run: black --check src/ app/ tests/

      - name: Flake8 check
        run: flake8 src/ app/ tests/ --max-line-length=120

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 2 — Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx dvc dvc-s3

      - name: DVC pull data
        run: dvc pull

      - name: Run tests
        run: python -m pytest tests/test_data.py -v
        

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 3 — Security (Trivy)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0  # Don't fail the build on vulnerabilities, just report them

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 4 — Docker Build + Push
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-push:
    name: Docker Build + Push ECR
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trivy scan — Docker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 0

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  # JOB 5 — Update GitOps
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-gitops:
    name: Update GitOps (ArgoCD)
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout mlops-gitops
        uses: actions/checkout@v4
        with:
          repository: FatimaGhi/mlops-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" \
              charts/model-serving/values.yaml
          git config user.email "ci@mlops.com"
          git config user.name "CI Bot"
          git add charts/model-serving/values.yaml
          git commit -m "ci: update model-serving image to ${{ github.sha }}"
          git push